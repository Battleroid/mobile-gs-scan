name: build-images

# Builds + publishes the docker images to ghcr.io. Two trigger shapes:
#
#   1. push to main / master  → tag `latest` + `sha-<short>`
#   2. push of a v* tag       → tag `<version>` + `latest` + `sha-<short>`
#
# Four images, all sharing the same trigger to keep registry version
# tags consistent across the stack:
#
#   ghcr.io/<owner>/mobile-gs-scan-base
#   ghcr.io/<owner>/mobile-gs-scan-api
#   ghcr.io/<owner>/mobile-gs-scan-worker-gs
#   ghcr.io/<owner>/mobile-gs-scan-web
#
# `${{ github.repository }}` preserves the case of the user/org login
# (e.g. `Battleroid/mobile-gs-scan`). ghcr.io is case-sensitive on
# image refs in some flows (notably `FROM` in downstream images), so
# we lowercase it once at the top of each job and use the lowered
# value in the tag list.

on:
  push:
    # Both `main` and `master` for the same reason ci.yml does.
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false # never overlap registry pushes

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      repo:    ${{ steps.r.outputs.repo }}
    steps:
      - id: v
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=edge" >> "$GITHUB_OUTPUT"
          fi
      - id: r
        env: { REPO: "${{ github.repository }}" }
        run: echo "repo=${REPO,,}" >> "$GITHUB_OUTPUT"

  # Base image FIRST — api / worker-gs FROM it via ghcr at build time.
  base:
    name: build · base
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.meta.outputs.repo }}-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

  api:
    name: build · api
    needs: [meta, base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.meta.outputs.repo }}-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ needs.meta.outputs.repo }}-base:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  worker-gs:
    name: build · worker-gs
    needs: [meta, base]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.meta.outputs.repo }}-worker-gs
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.gs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=ghcr.io/${{ needs.meta.outputs.repo }}-base:latest
          cache-from: type=gha,scope=worker-gs
          cache-to: type=gha,scope=worker-gs,mode=max

  web:
    name: build · web
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.meta.outputs.repo }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE=
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  summary:
    name: summary
    needs: [meta, base, api, worker-gs, web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "## published images (${{ needs.meta.outputs.version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for img in base api worker-gs web; do
            echo "- \`ghcr.io/${{ needs.meta.outputs.repo }}-$img\`" >> "$GITHUB_STEP_SUMMARY"
          done
